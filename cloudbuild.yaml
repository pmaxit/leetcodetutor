steps:
  # Build the Docker image with Tldraw license key as build arg
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_TLDRAW_LICENSE_KEY=${_VITE_TLDRAW_LICENSE_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-interview-platform:latest'
      - '.'

  # Generate env.yaml for Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat <<EOF > env.yaml
        OPENROUTER_API_KEY: "${_OPENROUTER_API_KEY}"
        OPENROUTER_URL: "${_OPENROUTER_URL}"
        OPENROUTER_FALLBACKS: "${_OPENROUTER_FALLBACKS}"
        LLM_PROVIDER_STRATEGY: "${_LLM_PROVIDER_STRATEGY}"
        DB_HOST: "${_DB_HOST}"
        DB_USER: "${_DB_USER}"
        DB_PASSWORD: "${_DB_PASSWORD}"
        DB_NAME: "${_DB_NAME}"
        DB_DIALECT: "mysql"
        DB_SOCKET_PATH: "/cloudsql/adveralabs:us-central1:adveralabs-mysql"
        LLM_ENABLE_TOOLS: "false"
        NODE_ENV: "production"
        EOF

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-interview-platform'
      - '--image=gcr.io/$PROJECT_ID/ai-interview-platform:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=adveralabs:us-central1:adveralabs-mysql'
      - '--port=8080'
      - '--timeout=120'
      - '--cpu=2'
      - '--memory=2Gi'
      - '--clear-secrets'
      - '--env-vars-file=env.yaml'

images:
  - 'gcr.io/$PROJECT_ID/ai-interview-platform:latest'

substitutions:
  _VITE_TLDRAW_LICENSE_KEY: ''
  _OPENROUTER_API_KEY: ''
  _OPENROUTER_URL: 'https://openrouter.ai/api/v1'
  _OPENROUTER_FALLBACKS: 'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free,qwen/qwen3.6-flash,meta-llama/llama-3.3-70b-instruct'
  _LLM_PROVIDER_STRATEGY: 'openrouter-only'
  _DB_HOST: ''
  _DB_USER: ''
  _DB_PASSWORD: ''
  _DB_NAME: ''

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
