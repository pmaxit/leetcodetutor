steps:
  # Build the Docker image with Tldraw license key as build arg
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_TLDRAW_LICENSE_KEY=${_VITE_TLDRAW_LICENSE_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-interview-platform:latest'
      - '.'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-interview-platform'
      - '--image=gcr.io/$PROJECT_ID/ai-interview-platform:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=adveralabs:us-central1:adveralabs-mysql'
      - '--port=8080'
      - '--timeout=120'
      - '--cpu=2'
      - '--memory=2Gi'

images:
  - 'gcr.io/$PROJECT_ID/ai-interview-platform:latest'

substitutions:
  _VITE_TLDRAW_LICENSE_KEY: ''

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
